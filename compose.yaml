services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    env_file:
      - path: ./.env
        required: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@file_get_contents('http://127.0.0.1:8000/up') === false ? 1 : 0);"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: >
      sh -lc "
      composer install --no-interaction --prefer-dist &&
      if [ ! -f .env ]; then cp .env.example .env; fi &&
      if ! grep -q '^APP_KEY=base64:' .env; then php artisan key:generate --ansi --force; fi &&
      php artisan serve --host=0.0.0.0 --port=8000
      "